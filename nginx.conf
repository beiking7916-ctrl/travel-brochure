server {
    listen 80;
    server_name localhost;

    absolute_redirect off;
    port_in_redirect off;

    # Nginx settings for serving the Vite build with base: '/travel-brochure/'
    location /travel-brochure {
        alias /usr/share/nginx/html/travel-brochure;
        index index.html;
        try_files $uri $uri/ /travel-brochure/index.html;
    }

    # Proxy Supabase API to bypass CORS
    location /supabase-api/ {
        proxy_pass https://kingsuper.zeabur.app/;
        proxy_set_header Host kingsuper.zeabur.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Add CORS headers if necessary, but proxying usually handles it
        add_header 'Access-Control-Allow-Origin' 'https://itin.jollifytravel.ink' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'X-Client-Info, Content-Type, Authorization, apikey, X-Requested-With' always;
        
        if ($request_method = 'OPTIONS') {
            return 204;
        }
    }

    # Redirect root to /travel-brochure/
    location = / {
        return 301 /travel-brochure/;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
